<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#0c1908"/>
  <!-- Warehouse roof -->
  <polygon points="256,72 416,172 96,172" fill="#76b900"/>
  <!-- Roof ridge line -->
  <line x1="256" y1="72" x2="256" y2="172" stroke="#0c1908" stroke-width="2" opacity="0.3"/>
  <!-- Warehouse body -->
  <rect x="120" y="172" width="272" height="200" fill="#76b900" opacity="0.85"/>
  <!-- Windows -->
  <rect x="148" y="196" width="44" height="36" rx="3" fill="#0c1908" opacity="0.7"/>
  <rect x="320" y="196" width="44" height="36" rx="3" fill="#0c1908" opacity="0.7"/>
  <!-- Window crosses -->
  <line x1="170" y1="196" x2="170" y2="232" stroke="#76b900" stroke-width="1.5" opacity="0.5"/>
  <line x1="148" y1="214" x2="192" y2="214" stroke="#76b900" stroke-width="1.5" opacity="0.5"/>
  <line x1="342" y1="196" x2="342" y2="232" stroke="#76b900" stroke-width="1.5" opacity="0.5"/>
  <line x1="320" y1="214" x2="364" y2="214" stroke="#76b900" stroke-width="1.5" opacity="0.5"/>
  <!-- Door -->
  <rect x="212" y="260" width="88" height="112" rx="4" fill="#0c1908"/>
  <!-- Door handle -->
  <circle cx="288" cy="320" r="6" fill="#76b900"/>
  <!-- Boxes in front -->
  <rect x="124" y="392" width="72" height="52" rx="4" fill="#76b900" stroke="#0c1908" stroke-width="3"/>
  <line x1="124" y1="410" x2="196" y2="410" stroke="#0c1908" stroke-width="2"/>
  <line x1="160" y1="392" x2="160" y2="444" stroke="#0c1908" stroke-width="2"/>
  <!-- Second box, slightly offset -->
  <rect x="208" y="404" width="56" height="40" rx="4" fill="#76b900" stroke="#0c1908" stroke-width="3"/>
  <line x1="208" y1="418" x2="264" y2="418" stroke="#0c1908" stroke-width="2"/>
  <line x1="236" y1="404" x2="236" y2="444" stroke="#0c1908" stroke-width="2"/>
</svg>
