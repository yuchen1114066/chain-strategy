<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" width="160" height="80">
  <!-- Warm beige/cream background -->
  <rect width="160" height="80" fill="#fdf3e3" rx="6"/>

  <!-- Subtle inner warm glow -->
